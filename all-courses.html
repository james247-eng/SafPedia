<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Digital Products - Tech Wizards Academy</title>
    <!-- We leverage a matching clean utility aesthetic for the marketplace frontend -->
    <link rel="stylesheet" href="css/marketplace.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

    <!-- MARKETPLACE HEADER -->
    <header class="marketplace-header">
        <div class="header-container">
            <a href="index.html" class="brand-logo">Tech Wizards Academy</a>
            <nav class="main-nav">
                <a href="all-courses.html" class="nav-link active">Browse Marketplace</a>
                <a href="dashboard.html" class="nav-link" id="student-portal-link">My Library</a>
            </nav>
            <div class="user-action-area" id="auth-status-container">
                <!-- Injected dynamically by Auth listener (Login Button / Avatar Button) -->
                <a href="sign-in.html" class="btn btn-primary">Sign In</a>
            </div>
        </div>
    </header>

    <!-- HUB HERO SEARCH & FILTERS SECTION -->
    <main class="catalog-wrapper">
        <section class="filter-hero">
            <h1>Discover Premium Digital Expertise</h1>
            <p>Access high-tier engineering bootcamps, architectural blueprints, audio deep-dives, and live developer sessions.</p>
            
            <div class="search-filter-bar">
                <div class="search-input-group">
                    <ion-icon name="search-outline"></ion-icon>
                    <input type="text" id="catalog-search" placeholder="What specific skill are you mastering today?">
                </div>
                <div class="select-group">
                    <select id="filter-format">
                        <option value="all">All Formats</option>
                        <option value="video">Video Masterclasses</option>
                        <option value="audio">Audio Deep Dives</option>
                        <option value="pdf">E-Books & Handouts</option>
                        <option value="live">Zoom Live Events</option>
                    </select>
                </div>
                <div class="select-group">
                    <select id="filter-category">
                        <option value="all">All Specialties</option>
                        <option value="web-development">Web Development</option>
                        <option value="mobile-development">Mobile Development</option>
                        <option value="data-analysis">Data Analysis</option>
                        <option value="graphic-design">Graphic Design</option>
                        <option value="digital-marketing">Digital Marketing</option>
                        <option value="video-editing">Video Editing</option>
                        <option value="cybersecurity">Cybersecurity</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- DYNAMIC MARKETPLACE GRID -->
        <section class="products-grid-container">
            <div id="catalog-grid" class="products-grid">
                <!-- Dynamic Content Render Target for Catalog Items -->
                <div class="loading-placeholder">Fetching premium catalog files...</div>
            </div>
        </section>
    </main>
    <script type="module" src="js/course.js"></script>
    <!-- FIREBASE AND BROWSE CONTROLLER SCRIPT HOOK 

-->
</body>
</html>
